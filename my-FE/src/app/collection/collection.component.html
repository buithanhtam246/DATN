<section class="collection">
  <div class="collection-container">
    <div class="collection-top">
      <span class="top-label">SẢN PHẨM MỚI</span>
    </div>
    <!-- Right Product Grid (full width after promo removed) -->
    <div class="collection-right">
      <div
        #productTrack
        class="product-track"
        [class.dragging]="isDragging()"
        (pointerdown)="onTrackPointerDown($event)"
        (pointermove)="onTrackPointerMove($event)"
        (pointerleave)="stopDragging()">
        @for (product of products(); track product.id) {
          <div class="product-item">
            <a [routerLink]="['/products', product.id]" class="product-image" (click)="viewProductDetail(product.id); $event.stopPropagation()">
              <img [src]="product.imageUrl" [alt]="product.title" loading="lazy" />
            </a>
            <div class="product-info">
              <a [routerLink]="['/products', product.id]" class="product-name-link">
                <h3 class="product-name">{{ product.title }}</h3>
              </a>
              <p class="product-brand-category">{{ product.brand }} / {{ product.category || '' }}</p>
              <div class="product-actions">
                <div class="product-price">{{ product.price }}</div>
                <a [routerLink]="['/products', product.id]" class="details-btn" (click)="viewProductDetail(product.id); $event.stopPropagation()">Chi tiết</a>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
