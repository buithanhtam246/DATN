<section class="products-section">
  <div class="section-header">
    <h2 class="section-title">SẢN PHẨM BÁN CHẠY</h2>
    
  </div>

  <div class="products-grid">
    @for (product of products(); track product.id) {
      <div class="product-item">
        <a [routerLink]="['/products', product.id]" class="product-image">
          <img [src]="product.imageUrl" [alt]="product.title" loading="lazy" />
        </a>
        <div class="product-info">
          <a [routerLink]="['/products', product.id]" class="product-name-link">
            <h3 class="product-name">{{ product.title }}</h3>
          </a>
          <p class="product-brand-category">{{ product.brand }} / {{ product.category }}</p>
          <div class="product-actions">
            <div class="product-price">{{ product.price }}</div>
            <a [routerLink]="['/products', product.id]" class="details-btn">Chi tiết</a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
