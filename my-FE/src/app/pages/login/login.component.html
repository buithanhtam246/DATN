<form (ngSubmit)="login()">

<div class="auth-container">

<div class="auth-left">
<div class="auth-form">

<h2>Welcome Back</h2>
<p>Vui lòng đăng nhập để tiếp tục sử dụng.</p>

<div class="form-group">
<label>Email</label>
<input 
type="email"
[(ngModel)]="email"
name="email"
[disabled]="isLoading"
(input)="onEmailChange()"
#emailInput
required>
<div class="error-message" *ngIf="emailError">{{ emailError }}</div>
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input 
type="password"
[(ngModel)]="password"
name="password"
[disabled]="isLoading"
(input)="onPasswordChange()"
#passwordInput
required>
<div class="error-message" *ngIf="passwordError">{{ passwordError }}</div>
</div>

<div class="remember">
<input type="checkbox" [disabled]="isLoading">
<span>Lưu thông tin đăng nhập</span>
<a routerLink="/forgot-password" class="forgot-password">
    Quên mật khẩu?
  </a>
</div>


  


<button class="btn-login" type="submit" [disabled]="isLoading || !isFormValid">
  {{ isLoading ? 'Đang đăng nhập...' : 'Sign in' }}
</button>

<div class="divider">or</div>

<button class="btn-google" type="button" [disabled]="isLoading">
Đăng nhập với Google
<img src="assets/images/google.jpg" class="google-icon">
</button>

<p class="register-link">
Chưa có tài khoản?
<a routerLink="/register">Tạo tài khoản</a>
</p>

</div>
</div>

<div class="auth-right">
<img src="assets/images/login-banner.jpg">
</div>

</div>

</form>
