<div class="auth-container">
  <div class="auth-left">
    <h2>Quên mật khẩu</h2>
    <p>Vui lòng nhập thông tin để đặt lại mật khẩu.</p>

    <form (ngSubmit)="sendOTP()" *ngIf="!showOTP && !showReset">
      <input 
        type="email" 
        placeholder="Nhập Gmail" 
        [(ngModel)]="email" 
        name="email"
        [disabled]="isLoading"
        required>

      <button 
        type="submit" 
        class="btn-send-otp"
        [disabled]="isLoading || !email">
        {{ isLoading ? 'Đang gửi...' : 'Gửi OTP' }}
      </button>
    </form>

    <form (ngSubmit)="verifyOTP()" *ngIf="showOTP && !showReset">
      <input 
        type="text" 
        placeholder="Nhập OTP" 
        [(ngModel)]="otp" 
        name="otp"
        [disabled]="isLoading"
        required>

      <button 
        type="submit" 
        class="btn-verify"
        [disabled]="isLoading || !otp">
        {{ isLoading ? 'Đang xác nhận...' : 'Xác nhận OTP' }}
      </button>
    </form>

    <form (ngSubmit)="resetPassword()" *ngIf="showReset">
      <input 
        type="password" 
        placeholder="Nhập mật khẩu mới" 
        [(ngModel)]="newPassword" 
        name="newPassword"
        [disabled]="isLoading"
        required>

      <input 
        type="password" 
        placeholder="Nhập lại mật khẩu" 
        [(ngModel)]="confirmPassword" 
        name="confirmPassword"
        [disabled]="isLoading"
        required>

      <button 
        type="submit" 
        class="btn-reset"
        [disabled]="isLoading || !newPassword || !confirmPassword">
        {{ isLoading ? 'Đang đổi...' : 'Đổi mật khẩu' }}
      </button>
    </form>

    <p class="back-link" *ngIf="showOTP || showReset">
      <a (click)="backToEmail()">Quay lại nhập email</a>
    </p>
  </div>

  <div class="auth-right">
    <img src="assets/images/login-banner.jpg" alt="Forgot Password Banner">
  </div>

</div>
