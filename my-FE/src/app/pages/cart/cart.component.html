<h1>GIỎ HÀNG</h1>

<table>
  <tr>
    <th>Sản phẩm</th>
    <th>Giá</th>
    <th>Số lượng</th>
    <th>Tổng</th>
  </tr>

  <tr *ngFor="let item of cart; let i = index">
    <td>{{item.name}}</td>
    <td>{{item.price}} đ</td>
    <td class="cart-qty">

<button (click)="decreaseQty(i)">-</button>

<span>{{item.quantity}}</span>

<button (click)="increaseQty(i)">+</button>

</td>
    <td>{{item.price * item.quantity}} đ</td>

    <td>
      <button (click)="removeItem(i)">Xóa</button>
    </td>
  </tr>

</table>

<h2>Tổng tiền: {{getTotal()}} đ</h2>

<button
[disabled]="cart.length === 0"
routerLink="/checkout">

Thanh toán

</button>
