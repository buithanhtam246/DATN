<form (ngSubmit)="login()">
  <div class="admin-auth-container">
    <div class="admin-auth-box">
      <div class="admin-header">
        <h1>Admin Login</h1>
        <p>Khu vực quản trị - Vui lòng đăng nhập</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          [disabled]="isLoading"
          (input)="onEmailChange()"
          #emailInput
          placeholder="Nhập email admin"
          required
        />
        <div class="error-message" *ngIf="emailError">{{ emailError }}</div>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          [disabled]="isLoading"
          (input)="onPasswordChange()"
          #passwordInput
          placeholder="Nhập mật khẩu"
          required
        />
        <div class="error-message" *ngIf="passwordError">{{ passwordError }}</div>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="!isFormValid || isLoading"
      >
        <span *ngIf="!isLoading">Đăng nhập</span>
        <span *ngIf="isLoading">
          <span class="spinner"></span> Đang xử lý...
        </span>
      </button>

      <div class="footer-text">
        <p>
          Trở về trang người dùng?
          <a href="/login">Đăng nhập bình thường</a>
        </p>
      </div>
    </div>
  </div>
</form>
