<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo">
      <a href="/" aria-label="Trang chủ">
        <img src="/assets/images/logo.png" alt="Logo" width="60" height="60" />
      </a>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <ul>
        @for (item of menuItems; track item.label) {
          <li><a [href]="item.link">{{ item.label }}</a></li>
        }
      </ul>
    </nav>

    <!-- Right Icons -->
    <div class="header-icons">
      <button class="icon-btn" aria-label="Search" (click)="onSearch()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>
      <button class="icon-btn" aria-label="User" (click)="onUserProfile()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Favorites" (click)="onFavorites()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
      <button class="icon-btn cart-btn" aria-label="Cart" (click)="onCart()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        @if (cartItemCount() > 0) {
          <span class="cart-badge">{{ cartItemCount() }}</span>
        }
      </button>
    </div>
  </div>
</header>
